version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: lens_dev_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - lens_dev_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: Dockerfile.backend
    container_name: lens_dev_backend
    image: lens-dev-backend:latest
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN}
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./uploads:/app/uploads
      - ./public:/app/public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lens_dev_network
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: Dockerfile.frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
        VITE_WEB_API_URL: ${VITE_WEB_API_URL}
        VITE_WS_URL: ${VITE_WS_URL:-}
        VITE_WS_SAME_ORIGIN: ${VITE_WS_SAME_ORIGIN:-true}
    container_name: lens_dev_frontend
    image: lens-dev-frontend:latest
    environment:
      BACKEND_PORT: ${PORT}
    ports:
      - "${VITE_APP_PORT}:80"
    depends_on:
      - backend
    networks:
      - lens_dev_network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lens_dev_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - ./pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - lens_dev_network
    restart: unless-stopped

networks:
  lens_dev_network:
    driver: bridge
